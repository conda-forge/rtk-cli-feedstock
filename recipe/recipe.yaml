context:
  version: "0.35.0"

package:
  name: rtk-cli
  version: ${{ version }}

source:
  url: https://github.com/rtk-ai/rtk/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5df52f759357a87c8252972818637bbd4f59f74ac574c6b144d8318eaca908b0

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script: rtk --help
  - package_contents:
      bin:
        - rtk
      strict: true

about:
  homepage: https://github.com/rtk-ai/rtk
  summary: CLI proxy that filters and compresses command outputs to reduce LLM token usage
  description: |
    RTK is a CLI proxy that filters and compresses command outputs before they
    reach an LLM's context window, achieving 60-90% token savings on typical
    dev commands like git, pytest, pip, ruff, docker, and more.
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/rtk-ai/rtk

extra:
  recipe-maintainers:
    - moritzwilksch
